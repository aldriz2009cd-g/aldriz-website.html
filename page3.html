<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BottomGround - Contact</title>
    <link rel="stylesheet" href="1style.css">
</head>
<body>

    <div class="promo-banner">
        Enjoy free shipping with a minimum of three items purchased.
    </div>

    <header class="header">
        <div class="logo">
            <a href="index.html">
                <img src="bottomground.jpg" alt="BottomGround Logo">
            </a>
        </div>
        <h1 class="site-title">WELCOME TO BOTTOMGROUND</h1>
        <div class="header-icons">
            <a href="PAGE1 DAW.html" class="nav-link">
                <button class="icon-btn nav-btn">🏠</button>
            </a>
            <a href="page2.html" class="nav-link">
                <button class="icon-btn nav-btn">🛒</button>
            </a>
            <a href="page3.html">
                <button class="icon-btn nav-btn">👤</button>
            </a>
        </div>
    </header>

    <div class="contact-wrapper">

        <div class="contact-header">
            <span class="have-questions">Have Some Questions?</span>
            <span class="contact-title">CONTACT</span>
        </div>

        <div class="contact-body">
            <div class="mail-icon-container">
                <svg class="mail-icon" viewBox="0 0 180 130" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect x="4" y="4" width="172" height="122" rx="6" fill="#2d3436"/>
                    <rect x="12" y="12" width="156" height="106" rx="4" fill="white"/>
                    <polyline points="12,12 90,72 168,12" fill="none" stroke="#2d3436" stroke-width="8" stroke-linejoin="round"/>
                </svg>
            </div>
            <div class="contact-fields">
                <input type="text" placeholder="Name">
                <input type="email" placeholder="E-Mail">
                <input type="tel" placeholder="Contact Number">
            </div>
        </div>

        <div class="message-area">
            <textarea placeholder="Message"></textarea>
        </div>

        <div class="send-btn-container">
            <button class="send-btn">SEND MESSAGE</button>
        </div>

    </div>

    <footer class="footer">
        <p class="powered-by">Powered By<br>Shopify</p>
    </footer>
    <div class="footer-bottom">
        <span class="copyright">@2025- BottomGround Apparel</span>
        <div class="payment-icons">
            <div class="paypal-icon">P</div>
            <span class="visa-badge">VISA</span>
            <span class="gpay-badge"><span>G</span> Pay</span>
        </div>
    </div>
    
 <script src="script.js"></script>
    
</body>
</html>
